version: 0.2
phases:
  install:
    commands:
      - pip3 install boto3
  build:
    commands:
      - echo "Validando generarweb.py..."
      - python3 -c "import ast; ast.parse(open('generarweb.py').read()); print('Sintaxis OK')"
  post_build:
    commands:
      - echo "Sincronizando con S3..."
      - aws s3 cp index.html s3://actividadclase/
artifacts:
  files:
    - "**/*"